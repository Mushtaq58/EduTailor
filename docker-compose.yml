services:

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: edutailor_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: edutailor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edutailor_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:admin123@db:5432/edutailor
    volumes:
      - ./backend/media:/app/media
      - ./backend/data:/app/backend/data
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edutailor_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: